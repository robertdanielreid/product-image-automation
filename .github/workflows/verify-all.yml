name: Verify all staged images
on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Gemini parallel workers'
        required: false
        default: '3'
      rps:
        description: 'Requests per second'
        required: false
        default: '2'

permissions:
  contents: read
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-v33.txt

      - name: Setup data
        run: |
          mkdir -p output webstore_image_output/staging
          cp data/all_20076_acquisition_results.csv output/ 2>/dev/null || true
          cp data/manual_visual_review.csv output/ 2>/dev/null || true
          cp data/rejected_candidates.csv output/ 2>/dev/null || true

      - name: Download staging images from batch runs
        run: |
          # Download all batch artifacts to get staging images and results
          runs=$(gh run list --workflow "batch-process.yml" --status success --limit 50 --json databaseId -q '.[].databaseId' 2>/dev/null)
          for run_id in $runs; do
            echo "Downloading batch $run_id..."
            gh run download "$run_id" --name "batch-results" --dir "prior-runs/$run_id" --repo ${{ github.repository }} 2>/dev/null || true
          done

          # Also try to get original acquisition images
          for i in $(seq 0 19); do
            gh run download 28997395080 --name "product-images-chunk-$i" --dir "orig-chunks/chunk-$i" --repo ${{ github.repository }} 2>/dev/null || true
          done

          # Merge all staging images
          python3 -c "
          import csv, shutil
          from pathlib import Path

          staging = Path('webstore_image_output/staging')
          staging.mkdir(parents=True, exist_ok=True)

          # Copy from original chunks
          for chunk_dir in sorted(Path('orig-chunks').glob('chunk-*')):
              for jpg in chunk_dir.glob('**/*.jpg'):
                  dest = staging / jpg.name
                  if not dest.exists():
                      shutil.copy2(jpg, dest)

          # Copy from batch runs
          for batch_dir in sorted(Path('prior-runs').glob('*')):
              for jpg in batch_dir.glob('**/*.jpg'):
                  dest = staging / jpg.name
                  if not dest.exists():
                      shutil.copy2(jpg, dest)

          # Also scan for any jpgs nested deeper
          for batch_dir in sorted(Path('prior-runs').glob('*')):
              for jpg in batch_dir.rglob('*.jpg'):
                  dest = staging / jpg.name
                  if not dest.exists():
                      shutil.copy2(jpg, dest)

          count = len(list(staging.glob('*.jpg')))
          print(f'Staging directory has {count} images')

          # Merge acquisition CSVs from batches
          output = Path('output')
          merged = {}
          # Load existing
          acq_csv = output / 'all_20076_acquisition_results.csv'
          if acq_csv.exists():
              for r in csv.DictReader(acq_csv.open(encoding='utf-8-sig')):
                  if r.get('batchIndex'):
                      merged[r['batchIndex']] = r

          for batch_dir in sorted(Path('prior-runs').glob('*')):
              for csv_file in batch_dir.glob('**/*.csv'):
                  if 'all_20076_acquisition' in csv_file.name:
                      try:
                          for r in csv.DictReader(csv_file.open(encoding='utf-8-sig')):
                              bi = r.get('batchIndex','')
                              if bi and bi not in merged:
                                  merged[bi] = r
                              elif bi and r.get('status','').startswith('STAGED') and not merged[bi].get('status','').startswith('STAGED'):
                                  merged[bi] = r
                      except: pass

          if merged:
              fields = list(next(iter(merged.values())).keys())
              with open(acq_csv, 'w', newline='', encoding='utf-8-sig') as f:
                  w = csv.DictWriter(f, fieldnames=fields, extrasaction='ignore')
                  w.writeheader()
                  w.writerows(merged.values())
              staged = sum(1 for v in merged.values() if v.get('status','').startswith('STAGED'))
              print(f'Merged acquisition: {len(merged)} rows, {staged} staged')

          # Merge review CSVs (preserve existing decisions)
          review_csv = output / 'manual_visual_review.csv'
          reviews = {}
          if review_csv.exists():
              for r in csv.DictReader(review_csv.open(encoding='utf-8-sig')):
                  if r.get('batchIndex'):
                      reviews[r['batchIndex']] = r

          for batch_dir in sorted(Path('prior-runs').glob('*')):
              for csv_file in batch_dir.glob('**/*.csv'):
                  if 'manual_visual_review' in csv_file.name:
                      try:
                          for r in csv.DictReader(csv_file.open(encoding='utf-8-sig')):
                              bi = r.get('batchIndex','')
                              if not bi: continue
                              bd = r.get('manualVisualDecision','')
                              if bi not in reviews:
                                  reviews[bi] = r
                              elif bd and bd not in ('PENDING','','REVIEW'):
                                  od = reviews[bi].get('manualVisualDecision','')
                                  if od in ('PENDING','','REVIEW',None):
                                      reviews[bi] = r
                      except: pass

          if reviews:
              rfields = list(next(iter(reviews.values())).keys())
              with open(review_csv, 'w', newline='', encoding='utf-8-sig') as f:
                  w = csv.DictWriter(f, fieldnames=rfields, extrasaction='ignore')
                  w.writeheader()
                  w.writerows(reviews.values())
              rdecs = {}
              for v in reviews.values():
                  d = v.get('manualVisualDecision','') or 'EMPTY'
                  rdecs[d] = rdecs.get(d, 0) + 1
              print(f'Merged reviews: {len(reviews)} rows, decisions: {rdecs}')
          "
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print pre-verification state
        run: |
          python3 -c "
          import csv
          from pathlib import Path
          acq = Path('output/all_20076_acquisition_results.csv')
          rv = Path('output/manual_visual_review.csv')
          staging = Path('webstore_image_output/staging')
          imgs = list(staging.glob('*.jpg'))
          print(f'Staging images on disk: {len(imgs)}')
          if acq.exists():
              rows = list(csv.DictReader(acq.open(encoding='utf-8-sig')))
              staged = sum(1 for r in rows if r.get('status','').startswith('STAGED'))
              print(f'Acquisition CSV: {len(rows)} rows, {staged} staged')
          if rv.exists():
              rrows = list(csv.DictReader(rv.open(encoding='utf-8-sig')))
              from collections import Counter
              decs = Counter(r.get('manualVisualDecision','') or 'EMPTY' for r in rrows)
              print(f'Review CSV: {len(rrows)} rows, decisions: {dict(decs)}')
          "

      - name: Run Gemini verification
        run: |
          python3 scripts/verify_staged_images_gemini.py \
            --package-root . \
            --store-root webstore_image_output \
            --model gemini-3.1-flash-lite-preview \
            --workers ${{ inputs.workers }} \
            --rps ${{ inputs.rps }} \
            --max-requests 0 \
            --resume

      - name: Print verification summary
        if: always()
        run: |
          python3 -c "
          import csv, json
          from pathlib import Path
          from collections import Counter

          gs = Path('output/gemini_verification_summary.json')
          if gs.exists():
              print(json.dumps(json.loads(gs.open().read()), indent=2))

          rv = Path('output/manual_visual_review.csv')
          if rv.exists():
              rows = list(csv.DictReader(rv.open(encoding='utf-8-sig')))
              decs = Counter(r.get('manualVisualDecision','') or 'EMPTY' for r in rows)
              print(f'\nReview decisions:')
              for d, c in decs.most_common():
                  print(f'  {d}: {c}')
          "

      - name: Upload verification results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-results
          path: |
            output/manual_visual_review.csv
            output/gemini_verification_summary.json
            output/rejected_candidates.csv
          retention-days: 30
